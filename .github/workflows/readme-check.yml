name: Live site checks

# Three independent checks against the live production site — README
# examples, catalog encoding, and internal link integrity — see the
# corresponding scripts/ file for what each one actually does and why.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily, independent of any push — catches production regressions too.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run README examples against the live catalog
        run: bash scripts/verify-readme.sh

      - name: Scan the full catalog for encoding corruption
        run: python3 scripts/check-encoding.py

      - name: Check for broken internal links on the live site
        run: python3 scripts/check-links.py
