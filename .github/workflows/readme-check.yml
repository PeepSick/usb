name: README examples

# Runs the exact commands documented in the README against the live catalog
# API and fails if any of them error, silently leak a traceback, or regress
# to non-English output. Catches drift between what the docs promise and
# what the CLI actually does — see scripts/verify-readme.sh for details.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily, independent of any push — catches production regressions too.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run README examples against the live catalog
        run: bash scripts/verify-readme.sh

      - name: Scan the full catalog for encoding corruption
        run: python3 scripts/check-encoding.py
